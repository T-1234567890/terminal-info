name: Post-release Verification

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: write

jobs:
  verify:
    name: Verify ${{ matrix.platform }}
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macOS (Intel, x86_64)
            asset: tinfo-x86_64-apple-darwin.tar.gz

          - os: macos-14
            platform: macOS (Apple Silicon, arm64)
            asset: tinfo-aarch64-apple-darwin.tar.gz

          - os: ubuntu-latest
            platform: Linux (x86_64)
            asset: tinfo-x86_64-unknown-linux-gnu.tar.gz

          - os: windows-latest
            platform: Windows (x86_64)
            asset: tinfo-x86_64-pc-windows-msvc.zip

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set tag
        run: echo "TAG=${{ github.event.workflow_run.head_branch }}" >> $GITHUB_ENV

      # -------------------------
      # Download
      # -------------------------

      - name: Download asset (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -fsSL -o asset \
          "https://github.com/${{ github.repository }}/releases/download/${TAG}/${{ matrix.asset }}"

      - name: Download asset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://github.com/${{ github.repository }}/releases/download/$env:TAG/${{ matrix.asset }}"
          Invoke-WebRequest $url -OutFile asset

      # -------------------------
      # Extract
      # -------------------------

      - name: Extract (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir out
          tar -xzf asset -C out

      - name: Extract (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Expand-Archive asset -DestinationPath out -Force

      # -------------------------
      # Find binary
      # -------------------------

      - name: Find binary (Unix)
        if: runner.os != 'Windows'
        run: |
          BIN=$(find out -type f -name tinfo -print -quit)
          if [ -z "$BIN" ]; then exit 1; fi
          echo "BIN=$BIN" >> $GITHUB_ENV

      - name: Find binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = Get-ChildItem -Recurse -Filter tinfo.exe | Select-Object -First 1
          if (-not $bin) { exit 1 }
          echo "BIN=$($bin.FullName)" >> $env:GITHUB_ENV

      # -------------------------
      # Core CLI tests
      # -------------------------

      - name: Run CLI tests (Unix)
        id: cli_unix
        if: runner.os != 'Windows'
        shell: bash
        continue-on-error: true
        run: |
          chmod +x "$BIN"

          "$BIN" --version
          "$BIN" --help > /dev/null

          "$BIN" system || true
          "$BIN" time || true
          "$BIN" network || true

      - name: Run CLI tests (Windows)
        id: cli_windows
        if: runner.os == 'Windows'
        shell: pwsh
        continue-on-error: true
        run: |
          & "$env:BIN" --version
          & "$env:BIN" --help | Out-Null

          try { & "$env:BIN" system } catch {}
          try { & "$env:BIN" time } catch {}
          try { & "$env:BIN" network } catch {}

      # -------------------------
      # Plugin system test
      # -------------------------

      - name: Plugin test (Unix)
        id: plugin_unix
        if: runner.os != 'Windows'
        shell: bash
        continue-on-error: true
        run: |
          "$BIN" plugin list || true
          "$BIN" plugin search test || true

      - name: Plugin test (Windows)
        id: plugin_windows
        if: runner.os == 'Windows'
        shell: pwsh
        continue-on-error: true
        run: |
          & "$env:BIN" plugin list
          & "$env:BIN" plugin search test

      # -------------------------
      # Save result
      # -------------------------

      - name: Save result
        if: always()
        run: |
          STATUS="❌ Failed"

          if [[ "${{ steps.cli_unix.outcome }}" == "success" || "${{ steps.cli_windows.outcome }}" == "success" ]]; then
            STATUS="✅ Passed"
          fi

          echo "{\"platform\":\"${{ matrix.platform }}\",\"status\":\"$STATUS\"}" > result.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.platform }}
          path: result.json

  update-release:
    name: Update Release Body
    runs-on: ubuntu-latest
    needs: verify
    if: always()

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: results

      - name: Update release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const platforms = [
              'macOS (Intel, x86_64)',
              'macOS (Apple Silicon, arm64)',
              'Linux (x86_64)',
              'Windows (x86_64)'
            ];

            const statuses = Object.fromEntries(platforms.map(p => [p, '❌ Failed']));

            for (const dir of fs.readdirSync('results')) {
              const file = path.join('results', dir, 'result.json');
              if (!fs.existsSync(file)) continue;

              const data = JSON.parse(fs.readFileSync(file));
              statuses[data.platform] = data.status;
            }

            const overall = Object.values(statuses).includes('❌ Failed')
              ? '❌ Partial failure'
              : '✅ Passed';

            const date = new Date().toISOString().slice(0, 10);

            const report = [
              "## Post-release verification",
              "",
              `**Overall status:** ${overall}`,
              "",
              "| Platform | Status |",
              "|----------|--------|",
              `| macOS (Intel, x86_64) | ${statuses['macOS (Intel, x86_64)']} |`,
              `| macOS (Apple Silicon, arm64) | ${statuses['macOS (Apple Silicon, arm64)']} |`,
              `| Linux (x86_64) | ${statuses['Linux (x86_64)']} |`,
              `| Windows (x86_64) | ${statuses['Windows (x86_64)']} |`,
              "",
              "**Legend:**",
              "✅ Passed",
              "❌ Failed",
              "",
              "---",
              "",
              `**Date:** ${date}`
            ].join('\n');

            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const release = releases[0];

            const current = release.body || '';
            const regex = /## Post-release verification[\s\S]*?(?=\n##|\n#|$)/;

            const body = regex.test(current)
              ? current.replace(regex, report)
              : current + "\n\n" + report;

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body
            });