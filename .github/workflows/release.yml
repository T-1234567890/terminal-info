name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive_name: tinfo-x86_64-unknown-linux-gnu.tar.gz
            binary_name: tinfo

          - os: macos-latest
            target: x86_64-apple-darwin
            archive_name: tinfo-x86_64-apple-darwin.tar.gz
            binary_name: tinfo

          - os: windows-2022
            target: x86_64-pc-windows-msvc
            archive_name: tinfo-x86_64-pc-windows-msvc.zip
            binary_name: tinfo.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/${{ matrix.binary_name }}
          tar -czf ${{ matrix.archive_name }} -C dist ${{ matrix.binary_name }}

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.binary_name }}"
          Compress-Archive -Path "dist/${{ matrix.binary_name }}" -DestinationPath "${{ matrix.archive_name }}"

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_name }}
          generate_release_notes: true
