name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    env:
      MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: tinfo-x86_64-unknown-linux-gnu.tar.gz
            binary_name: tinfo

          - os: macos-latest
            target: x86_64-apple-darwin
            archive_name: tinfo-x86_64-apple-darwin.tar.gz
            binary_name: tinfo

          - os: macos-14
            target: aarch64-apple-darwin
            archive_name: tinfo-aarch64-apple-darwin.tar.gz
            binary_name: tinfo

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: tinfo-x86_64-pc-windows-msvc.zip
            binary_name: tinfo.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Install minisign
        if: runner.os != 'Windows'
        run: |
          if [ -z "$MINISIGN_SECRET_KEY" ]; then
            echo "MINISIGN_SECRET_KEY is required for release signing."
            exit 1
          fi
          if command -v minisign >/dev/null 2>&1; then
            exit 0
          fi
          if command -v brew >/dev/null 2>&1; then
            brew install minisign
          elif command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y minisign || {
              sudo apt-get install -y build-essential pkg-config libssl-dev libsodium-dev git
              git clone --depth 1 https://github.com/jedisct1/minisign.git /tmp/minisign-src
              make -C /tmp/minisign-src
              sudo install /tmp/minisign-src/minisign /usr/local/bin/minisign
            }
          else
            echo "Unable to install minisign on this runner."
            exit 1
          fi

      - name: Install minisign (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not $env:MINISIGN_SECRET_KEY) {
            throw "MINISIGN_SECRET_KEY is required for release signing."
          }
          choco install minisign -y

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/${{ matrix.binary_name }}
          tar -czf ${{ matrix.archive_name }} -C dist ${{ matrix.binary_name }}
          shasum -a 256 ${{ matrix.archive_name }} > ${{ matrix.archive_name }}.sha256
          printf '%s' "$MINISIGN_SECRET_KEY" > minisign.key
          chmod 600 minisign.key
          minisign -S -W -s minisign.key -m ${{ matrix.archive_name }} -x ${{ matrix.archive_name }}.minisig -t "${{ matrix.archive_name }}"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.binary_name }}"
          Compress-Archive -Path "dist/${{ matrix.binary_name }}" -DestinationPath "${{ matrix.archive_name }}"
          $hash = (Get-FileHash "${{ matrix.archive_name }}" -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "${{ matrix.archive_name }}.sha256" -Value "$hash  ${{ matrix.archive_name }}"
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText("minisign.key", $env:MINISIGN_SECRET_KEY, $utf8NoBom)
          minisign -S -W -s minisign.key -m "${{ matrix.archive_name }}" -x "${{ matrix.archive_name }}.minisig" -t "${{ matrix.archive_name }}"

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.archive_name }}
            ${{ matrix.archive_name }}.sha256
            ${{ matrix.archive_name }}.minisig
          generate_release_notes: true
